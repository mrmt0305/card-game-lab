<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Game Playground</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined&icon_names=settings&display=block" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="playground">
    <button
      class="settings-trigger"
      type="button"
      aria-label="Open game setup"
      aria-controls="settings-modal"
      aria-expanded="false"
    >
      <span class="gear-icon material-symbols-outlined" aria-hidden="true">settings</span>
    </button>

    <section class="arena-layout">
      <aside class="shared-stack-column" aria-label="Shared deck and discard pile">
        <div class="shared-stack">
          <span class="stack-count" data-deck-count>30</span>
          <div class="mini-slot shared deck-source card-back" draggable="true" data-draw-deck="shared">裏</div>
          <span class="stack-label">Common Deck</span>
        </div>
        <div class="shared-stack">
          <span class="stack-count" data-discard-count>0</span>
          <div class="mini-slot shared discard-slot"></div>
          <span class="stack-label">Common Grave</span>
        </div>
      </aside>

      <section class="hand-preview-column" aria-label="Reserved hand column">
        <div class="hand-preview hand-preview-opponent">
          <div class="hand-preview-track">
            <div class="hand-slot"></div>
            <div class="hand-slot"></div>
            <div class="hand-slot"></div>
            <div class="hand-slot"></div>
            <div class="hand-slot"></div>
            <div class="hand-slot"></div>
          </div>
        </div>
        <div class="hand-preview hand-preview-player drop-target" data-hand-zone="player">
          <div class="hand-preview-track">
            <div class="hand-slot" data-hand-slot></div>
            <div class="hand-slot" data-hand-slot></div>
            <div class="hand-slot" data-hand-slot></div>
            <div class="hand-slot" data-hand-slot></div>
            <div class="hand-slot" data-hand-slot></div>
            <div class="hand-slot" data-hand-slot></div>
          </div>
        </div>
      </section>

      <section class="battlefield">
        <section class="field field-opponent">
          <div class="zone-hand">
            <div class="card-slot"></div>
            <div class="card-slot"></div>
            <div class="card-slot"></div>
            <div class="card-slot"></div>
            <div class="card-slot"></div>
            <div class="card-slot"></div>
            <div class="card-slot"></div>
            <div class="card-slot"></div>
          </div>
          <div class="zone-main">
            <div class="board-line">
              <div class="card-slot large"></div>
              <div class="card-slot large"></div>
              <div class="card-slot large"></div>
              <div class="card-slot large"></div>
              <div class="card-slot large"></div>
            </div>
          </div>
        </section>

        <section class="field field-player">
          <div class="zone-main">
            <div class="board-line">
              <div class="card-slot large"></div>
              <div class="card-slot large"></div>
              <div class="card-slot large"></div>
              <div class="card-slot large"></div>
              <div class="card-slot large"></div>
            </div>
          </div>
          <div class="zone-hand">
            <div class="card-slot"></div>
            <div class="card-slot"></div>
            <div class="card-slot"></div>
            <div class="card-slot"></div>
            <div class="card-slot"></div>
            <div class="card-slot"></div>
            <div class="card-slot"></div>
            <div class="card-slot"></div>
          </div>
        </section>
      </section>
    </section>

    <div class="modal-backdrop" id="settings-modal" hidden>
      <section class="settings-modal" role="dialog" aria-modal="true" aria-labelledby="settings-title">
        <div class="settings-modal-header">
          <h1 id="settings-title">Game Setup</h1>
          <button class="modal-close" type="button" aria-label="Close game setup">×</button>
        </div>

        <div class="settings-modal-body">
          <section class="panel-block">
            <h2>Game Setup</h2>
            <label class="control">
              <span>Format</span>
              <select>
                <option>Standard Duel</option>
                <option>Draft Test</option>
                <option>Sandbox</option>
              </select>
            </label>
            <label class="control">
              <span>Turn</span>
              <input type="number" min="1" value="1">
            </label>
            <label class="control">
              <span>Energy</span>
              <input type="number" min="0" value="3">
            </label>
          </section>

          <section class="panel-block">
            <h2>Players</h2>
            <label class="control">
              <span>Opponent HP</span>
              <input type="number" min="0" value="20">
            </label>
            <label class="control">
              <span>Your HP</span>
              <input type="number" min="0" value="20">
            </label>
          </section>
        </div>
      </section>
    </div>
  </main>
  <script src="./main.js"></script>
</body>
</html>
